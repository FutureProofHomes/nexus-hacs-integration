# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py313"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "D203", # no-blank-line-before-class (incompatible with formatter)
    "D212", # multi-line-summary-first-line (incompatible with formatter)
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter
    # Home Assistant callback signatures intentionally have unused arguments
    "ARG001", # Unused function argument (common in HA platform setup functions)
    "ARG002", # Unused method argument (common in HA config flow steps)
    "ARG003", # Unused class method argument (common in HA subentry type hints)
    # Accessing internal OpenAI client for health checks
    "SLF001", # Private member access (_client is needed for httpx transport)
    # Standard HTTP status codes
    "PLR2004", # Magic number (401 is standard HTTP status)
    # Complexity thresholds - these are complex domain functions
    "C901", # McCabe complexity
    "PLR0912", # Too many branches
    "PLR0913", # Too many arguments
    "PLR0915", # Too many statements
    # Boolean params are intentional in stream transform
    "FBT001", # Boolean-positional-arg-in-function-definition
    "FBT002", # Boolean-default-positional-argument-in-function-definition
    "E501", # Line length (allows slightly longer lines for readability)
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25